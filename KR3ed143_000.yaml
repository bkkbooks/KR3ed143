front:
  text: 序吾友沈君仲圭博雅士也精究岐黃富有穎悟復從武林名醫王香岩先生遊盡得其傳造詣乃益深先生為我湖已故名醫凌公曉五之高足凌公固儒而醫者也當時求診之繁及門之盛首屈一指而尤能博濟貧病始終罔懈是以鄉中故老至今猶稱道之活人術深濟世心厚可以為公詠矣公晚年自號折肱老人年七十二歸道山惜乎公之著作絶少流傳今沈君慨然以表揚先哲啓迪後來為己任將凌公遺著次第付梓並承郵視凌臨靈方一冊囑為序言堯雖不文然聆斯舉彌覺撫掌稱快漱誦之餘乃益嘆沈君師承有由來也是書選案不多而皆精肯吉光片羽珍貴奚如愧余筆乏生花未能為公表揚萬一僅於公之行略及沈君刊傳之熱忱用志數言為讀者告時維黃帝紀元四六三七年歲次第七十八甲子孟夏之上浣後學費澤堯拜撰于山右旅次
