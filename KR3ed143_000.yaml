膝象貝射干炒牛蒡鮮生地赤芍珠黃散分二次白滾湯沖服五釐山豆根川鬱金丹皮炒天蠶碧玉散鮮竹瀝鮮細葉石菖蒲連根搗汁三匙和沖活水蘆根喉痹某經云一陰一陽結謂之喉痹古無喉科專門故不分症通稱之喉痹夫一陰者厥陰也一陽者少陽也二經上循咽嗌君相火熾結為喉痹良由榮陰內虧水不涵木木火上炎先患目疾繼發喉痹同是一源之恙所謂陰虛喉為之患也脈形弦數舌苔邊紅中黃治擬滋陰降火內經又云壯水之主以制陽光法也附方請明眼裁之元參肥知母丹皮朱茯神枇杷葉射干鮮石斛懷牛膝象貝鮮竹茹山豆根鮮生地石決明金果欖頭項結核潘右螺螄莊痰凝氣滯頸項結核久延恐成乳癧脈弦滑數擬逍遙合疏解法鱉血炒柴胡白茯苓制香附忍冬藤地栗金當歸丹皮子青皮土貝東白芍左牡蠣真橘核陳海蜇又六味丸半斤消癧丸四兩二味和勻每日清晨午後空心淡鹽湯送下三錢噎膈吳左八月痰氣交阻病成噎膈脈右弦滑治宜降氣豁痰即老夫自吃風哮之方加川鬱金全栝蔞翻胃張左十一月嗜飲傷胃鬱怒傷肝木為土賊生化之源大傷以致胃不受納經云食入反出者屬上膈也脈來弦細而數病延半載非易調治真川連全栝蔞新會皮妙竹茹牛囀草淡乾薑旋覆花製半夏青皮蔗汁炒枳實代赭石八月扎赤苓或可加牛乳韭汁枇杷葉之類肝氣胃寒葉中虛留飲肝胃不和乍寒乍熱嘔吐酸飲頭脹眩暈脈右弦滑而浮治宜疏解老蘇梗新會皮制香附白蔻仁廣藿香左金丸三分拌炒赤苓澤瀉淡姜渣制川朴宋半夏六神麯胃火沖逆陽明熱病舌胎黃燥渴嘔惡脈來洪滑米飲入口即吐惟涼水可納者宜千金蘆根湯主之薑汁炒竹茹亦主之肝火乘胃傷寒甚熱之時自覺氣從左升嘔吐勺水不納脈滑數舌燥刺或嘔苦黃水此肝火上乘於胃也宜降之泄之川連吳萸肉薑汁炒竹茹青陳皮赤白苓半夏薑汁沙山梔八月扎之類上厄陳左七月風痰阻郁肺氣肺不主宣厄逆頻頻由來旬余脈右弦滑按缺達治宜疏風豁痰粉沙參化陳皮炒白蒺赤苓炒蘇子宋半夏玫瑰花八月扎白杏仁旋覆花川貝紫石英潘中虛厄逆東洋參柿蒂旋覆花建蓮肉公丁香生薑紫石英大紅棗每日晨服胡桃同杏仁雪冰糖研沖服下厄沈新市六塔里左年五十歲真陰不足肝腎陰火挾同衝脈上逆厄逆頻頻無休息時覺氣自少腹而上謂之下厄久延恐成厄忒之變脈小弦數治擬都氣飲佐以攝納法東洋參懷山藥朱茯神紫石英真紫沉水香大熟地縮砂末四分拌丹皮北五味刀豆子核桃肉陳萸肉澤瀉旋覆花紫油安桂心瘕氣沈右三月肝陰不足氣鬱成瘕攻逆脘悶左脊痞痛痛甚欲嘔脈右弦滑治宜疏化金鈴子東白芍左金丸焦麥芽延胡索制香附沉香曲朱茯神全當歸宣木瓜小青皮車前草陸左寒濕成疝治宜疏解金鈴子制香附全當歸椒目元胡小青皮赤苓真橘核東白芍荔枝核澤瀉車前草或加小茴香木香胡蘆巴熱加飛滑石瘧母周左小溪口二月三瘧纏久榮陰自虛脾失統運之權寒濕瘧痰留滯成癥左脅痞脹有形三瘧仍來腹脹少納四肢酸倦暮夜盜汗脈象弦數治擬泄木和中鱉血炒柴胡淡鱉甲大腹絨全當歸東白芍如桂枝左金沉香等俱可拌焙鼠婦小青皮焦麥芽制香附半貝丸奎紅生薑搗汁炒或加青蒿子地骨皮或用鱉甲煎丸阿魏消痞丸等類胃寒痛牛左年草六上興橋寒濕氣滯肝胃不和胃脘當心而痛痛甚欲嘔脈右弦緩治擬泄木和中生米仁宣木爪東白芍桂枝三分拌炒赤苓縮砂仁或用陽春砂仁廣藿香左金丸三分拌新會皮延胡索小青皮制香附法半夏瓦楞子焦麥芽如乾薑吳萸刺猥皮九香蟲肉桂沉香之類隨意用之常服香砂養胃丸大佳南皋橋七家田沈商堯年五十餘胃寒痛不止脈弦遲舌白胖清烏鎮沈馨齊治之用歸耆建中湯一劑即止方附後桂枝一錢煨姜三片全當歸二錢東白芍三錢紅棗三枚大棉耆一錢五分炙甘草七分飴糖三錢胡蘆巴一錢朱北街年三十六月專請飢飽失常勞倦內傷厥陰肝氣橫逆擾動胃中留伏痰飲痰氣交阻肝胃氣失通調胃脘當心而痛痛甚欲嘔兩脅支滿甚且厥逆拘攣不仁屢經更醫擬進辛溫香燥之品肝胃血液益受其耗而脘痛脅脹不除病經旬余食不沾唇形肉羸瘦嘗讀內經有云肝苦急急食甘以緩之治肝之體宜酸宜甘治肝之用宜酸宜苦酸甘能斂肝陰肝與胃臟腑相對一勝則一負肝善升而胃少降所以見證如是也今診脈象虛數近弦右關弦滑而浮舌胎黃糙邊紅擬宗經旨主治附方請明眼酌奪臺參鬚玫瑰花三朵同燉沖東白芍新會皮吉梅炭筧麥冬左金丸宋制夏緑梅蕊清炙甘草宣木瓜朱茯神陳冬米腹痛錢左三月寒濕氣滯肝胃不和繞臍腹痛糾纏不已脈右弦滑治宜泄木和中金鈴子荔枝核新會皮小茴香淡乾薑元胡索宣木瓜法夏焦麥芽制香附左金丸小青皮廣木香石瘕陳右三月血虛氣滯已成石瘕少腹痛脹經停五月脈弦澀數治宜疏散紫丹參粉赤芍地鱉蟲小青皮制香附延胡索懷牛膝焦麥芽全當歸五靈脂紅通草輕者可用疝氣法重者可用內瘧法內癰鄭包家弄瘀滯小腸少腹痛脹有形有質勢成內癰乍熱乍寒眠食缺安脈象弦數治宜疏散金鈴子粉赤芍桃仁懷牛膝紅通草延胡索制香附制軍小青皮歸尾真橘核紫油安桂三分去皮飯丸分吞焦麥芽腰痛老宸兄勞傷蓄血阻住腰膂筋絡症起腰腧抽掣作痛交陰分時為甚皮色不變眠食缺安脈弦澀數治宜疏散金毛狗脊赤白芍雞血藤西秦艽全當歸川斷肉明乳香七分麻皮綿杜仲粒紅花炒甲片腎虛腰痛青蛾丸主之癃閉沈局票小便祕蟋蟀三隻酒洗焙燥如無以螻蛄代之用腐衣包吞之元參焦梔萹蓄粉青黛翹殼童木通瞿麥益元散真西珀三分同燈心研極細末拌真川連海金沙丹皮車前子或用龍薈通關丸等類外治以麝香用蛤殼合臍中血淋欽左望丹橋三月陰虛陰火下注小便淋濁溺管塞痛脈小弦數治宜清理馮左六月胞移熱於膀胱則癃溺血又云膀胱不利為癃小便癃閉溺血此由陰虛火熾心火妄動使然脈象弦數治宜清降血餘炭童木通西琥珀仙鶴草旱蓮草甘草梢赤苓麋銜草丹皮海金沙澤瀉車前子如氣淋者宜萆薢分清飲遺精陳左六月腎開竅于于陰精竅開則溺竅閉溺竅開則精竅閉時乃濕土司令濕鬱熱蒸水道不利土愈不燥是以體疲內熱精滑自遺小便赤澀大便閉結有時跗腫面浮口苦胃鈍脈左弦數右濡數切勿以陰虛火熾治之元參童木便真川柏川萆薢翹殼鮮生地益元散真西珀二分研極細末拌車前草焦山梔肥知母淡竹葉夢遺左二月操用神機肝木與心火相為煽動肝膽內寄相火心火妄動則相火隨之精滑不固五內煩熱體疲胻酸皆屬陰分不足之恙脈弦小數治宜滋清一法擬方請政臺參鬚細生地丹皮蓮子心大麥冬東白芍朱茯苓車前子懷山藥左牡蠣澤瀉或用聚精丸小滋腎丸等類聚精丸方潼蒺藜線魚膘膠蛤粉炒珠小滋腎丸方真川柏三錢豬脊髓一條為丸分吞附喉科金銀散治爛喉痧緊喉風凡因火喉痛喉腫喉間糜爛吹之足佐湯劑初起尤靈人指甲五分煅鵝管石三分煅真腰黃二分硼砂三分漂大梅片一分姜蠶二分炒斷絲照方修合不可增減上六味除指甲梅片外各研細末置研器內再研然後入指甲梅片研至無聲為度裝內緊塞其口以防泄氣用時以自來風打入
