body:
  text: 風溫夾食某左風溫外襲肺氣不宣加以食滯壅遏府氣釀痰化熱體熱頭痛咳嗽嘔惡眠食缺安脈弦滑而數胎中白尖紅防發風疹先宜疏肺羚角片嫩薄荷純鉤鮮竹茹焦楂肉連翹金蟬衣白杏仁銀花露牛蒡橘紅象貝川鬱金時瘄吳官十一月時瘄未得宣達此由風溫束肺為患脈滑而數治宜辛涼宣解羚角片薄荷純嫩鉤麥芽銀花露連翹蟬衣通草蘆根牛蒡丹皮象貝竹茹濕溫程四月濕溫邪擾於陽明頭痛暈眩身熱煩渴筋骨酸楚暮夜神昏譫語大便挾熱溏泄小便短赤脈弦滑數治宜清解羚角片薄荷梗丹皮益元散牛黃清心丸一顆連翹川鬱金象貝銀花露牛蒡鮮斛竹茹車前子暑風兼疹長兄六月感受暑風擾於肺胃吐瀉交作脘悶煩渴身熱無休肌膚已現風疹未得宣達神煩不寐全無汗出脈弦滑數胎黃糙治宜辛涼宣解羚角片嫩薄荷青蒿子鮮竹茹萬氏清心丸連翹川鬱金純鉤車前草牛蒡鮮斛象貝銀花露暑濕姑奶奶暑風穢濕互擾陽明升降不和寒熱如潮脘悶絡酸口乾溺少脈弦滑數胎黃膩惟恐汗出不徹轉受白㾦之弊治宜清解一法連翹川斛赤苓川鬱金銀花露佩蘭葉青蒿子益元散純鉤牛蒡地骨皮杏仁竹茹白㾦伏暑蒸化白㾦未得宣達照前方或可加羚角片緑豆衣車前草象貝通草頭痛甚者中薄荷數分無汗加橘紅淡豆豉脘悶加川朴廣皮白沈老潮三十二歲大胖子七月十六日暑濕熱邪擾於陽明體稟多濕多痰痰熱阻鬱氣機升降不宣神煩脘悶骨絡煩疼頭眩支倦紅疹已透未得宣達脈弦數右寸關兼浮滑治宜清解局方紫雪丹連翹鮮扁斛真川連車前草牛黃清心丸牛蒡丹皮益元散蘆根羚角片佩蘭葉純鉤鮮石菖蒲根一錢五分搗汁和沖鮮竹瀝按痧疹已透尚未宣達如無刺平塌者俗為疹子透勿出若冒風即隱屬內陷者危俗為疹子回肚是也又按痧疹有刺者佳無刺勿起者危又十七日再診原方一帖又十八十九日去紫雪丹加川鬱金又二十日紅疹已得透解肺胃痰熱未清肝胃氣滯不和時有潮熱脘悶支倦神疲嗜臥口苦溺赤脈小弦數胎黃膩治宜清肅上中佐以平肝元參佩蘭葉杏仁黑梔車前草連翹鮮斛真川貝銀花露牛蒡丹皮全瓜姜益元散又二十二日陽明遺濕未清心脾尚有餘熱肝胃不和口乾嘔酸頭眩支倦便解下矢堅黑小溲短赤而澀且痛脈弦小數胎光紅治宜清解為法元參青蒿生穀芽宋半夏象貝同拌車前草一兩煎湯代水連翹鮮斛新會皮佩葉葉童木通益元散真西珀三分同燈心研同拌丹皮薑汁焦梔紅疹褚阿大木行水手七月紅疹由潮透達肺胃痰火有餘壯熱脘悶神煩口渴脈弦滑數治宜清解陽明附方請正牛黃清心丸連翹丹皮竹瀝鮮細石菖蒲根一錢五分搗汁和沖蘆根紫雪丹牛蒡純嫩鉤貝母羚角片青蒿鮮斛車前草按犀角能透少陰陽明之邪疹㾦當為要藥牛黃清心丸清心包之痰火與熱證相宜若疹㾦家非其長也紫斑萬左八月陽明血熱遍身致發紫斑牙齦衄血不已大便不爽小便赤身疲內熱脈弦洪數治宜清解陽明以搜伏邪為法元參大青人中黃川鬱金大竹葉犀角尖丹皮連翹黑荊芥鮮生地赤芍淨銀花天蟲按青腿牙疳亦宜從此方加馬勃薄腦飲之即愈此症詳外科金鑑吳醫匯講參看春溫逆入心包曹十七歲二月二十四日春溫化斑隱約不達痰火自肺胃逆入心營熱傷津液神昏譫語手指掣搐唇齒燥裂出血苔焦燥邊紅脈弦滑數兼見以脈參證慎防痰升內閉之憂擬清解為法以俟高明酌奪臺參鬚牛蒡丹皮石決明青黛五分拌打竹瀝鮮石菖蒲汁一茶匙和沖烏犀角川鬱金純鉤人中黃銀花露翹心鮮地赤芍珠黃散西珀三分研同衝入伏暑遊左蔣杏泉診八月伏暑內發新涼外束自肺胃干及少陽先起寒熱作潮繼則壯熱神蒙煩渴引飲胸脘懊憹脈來弦數而滑兩尺偏大兩關短數苔黃膩四支厥逆兩目悶瞀便溏溲少以脈參證惟恐邪郁不達致上厥下脫之變擬升提陽明宣解一法是否如斯附方即請高明酌正羚羊片葛根川鬱金柴雪丹三分沖竹茹連翹制川朴通草銀花露薄荷梗新會皮益元散車前草服一劑白㾦紅疹即透紫雪丹易金斛伏暑內閉金松依看菜園為業年五十六歲八月伏暑內閉治之非易先以烏梅擦牙待牙關一開即進至寶丹一顆菖蒲湯下羚角片川鬱金竹瀝鮮石菖根和沖益元散連翹丹皮石決明車前草牛蒡純嫩鉤陳膽星小至寶丹一顆又次日灌藥後而內閉即開神色時有不清仍宗前法照原方去至寶丹竹瀝加牛黃清心丸竹茹熱入營分錢十一歲煩出於心躁出於腎熱邪深入營分津液被奪壯熱口渴煩躁不安惟恐熱邪從營分逆於心主宮城激動肝風致有痙厥之變脈弦滑數治宜清解為法冀其轉機附方候正元參薄荷純鉤鮮竹瀝石菖汁同沖牛黃清心丸連翹川鬱金石決明車前草羚角片丹皮京膽星紫雪丹熱入厥陰喻年十五歲七月十日病經旬余熱傷營陰暑濕熱邪深入厥陰內熱煩渴體力疲憊眩暈昏黑四支厥逆時有潮熱肌腠曾有白㾦未得宣達風動痙厥慎防厥脫之變脈弦滑數按之均少神韻治宜清心滌痰兼平肝宣竅附方請正臺參鬚玫瑰花三朵同燉沖純嫩鉤青蒿子竹瀝牛黃清心丸真滁菊石決明真川連三分拌川鬱金膽星丹皮朱茯神薄荷益元散方中有膽星牛黃川連可勿用也又次日厥逆已平喘汗已止而肺津胃液已被熱邪劫耗潮熱未退大便挾熱旁流左脅痞痛拒按神疲支倦不飢不納脈虛數近弦苔黃糙治宜滋清以撤餘邪還須節食避風勿使反復另紙録方請正臺參鬚玫瑰花三朵同燉沖東白芍青蒿子車前草小青皮連心麥冬左牡蠣丹皮生穀芽金扁石斛淡鱉甲純嫩鉤朱茯神如舌胎黃糙遺邪尚未清淨參麥滯膩用宜斟量見症不飢不納膩補更宜加意審辨為重按上方及此方即復脈之變方也熱邪消爍津液某七月體稟陰虛感受酷暑熱邪蘊留陽明加以風食擾動始起頭疼惡寒煩渴嘔惡繼則身熱脘悶熱甚神昏肌腠曾現紅疹白㾦漸次透達病經一月之久肺津與胃液已被熱邪消爍前治一派蠻法遂致陰分日耗一日所謂奪汗則無血也今診脈象弦滑虛數按之均少神韻唇焦口燥以脈參證再延恐有喘脫之虞姑擬扶正化邪冀其轉機附方請高明酌正臺參鬚玫瑰花三朵同燉沖天花粉石決明真川貝珠黃散大連心麥冬鮮金斛朱茯神竹瀝菖蒲汁一茶匙同沖鮮生地丹皮連翹益元散真西珀三分研同沖迭因前治進滋膩收澀之品擬用花露以滌腸胃銀花露青蒿露佛手露玫瑰露鮮穀子露杷葉露按此即甘露飲法陰虛陽浮葉左七月十三日燈下二年前曾經咯血火升咳嗽由來日久陰虛陽浮不喻可知入夏以來感受暑濕熱邪自陽明擾動肝陽潮熱來時於火妄動遺精走泄小便短赤口渴津煩前醫竟作溫熱論治甚至服二角二鮮紫雪至寶之類津液從此暴脫唇灰燥裂舌起白屑大便泄痢不止內熱而飲不解渴脈細如絲將有喘脫之虞勉擬壯水之主以制陽光法然鞭長莫及矣附方請高明酌奪臺參鬚玫瑰三朵同燉沖女貞子鱉甲童便炙炒秫米車前草麥冬米炒東白芍青蒿童便炙鮮蓮子霍石斛左牡蠣生熟穀芽各四錢半貝丸又十四日次診大便已結內熱亦減精神漸旺而腰膂痛楚脘窒少納眩暈體疲此陰虛也脈尚濡小而數兩關近弦舌邊微紅中後白屑已退而微黃治從前法略為損益附方請政臺參鬚左牡蠣地骨皮生穀芽車前草金扃斛淡鱉甲朱茯神生米仁東白芍陳青蒿真川貝鮮蓮子陰斑某初平診春分節後肝木犯中乘脾則瀉犯胃則嘔病起夜半肢厥脈伏喘汗發斑慎防閉脫之變勉擬附子理中為法或可挽回萬一另請高明酌政高麗別直參玫瑰花五朵燉沖左牡蠣熟附五分同煮去附入煎宣木瓜生仙居術淡乾薑新會皮清炙甘草東白芍左金丸三分拌入煎朱茯神復診昨擬進人參附子回陽法今吐瀉已止知飢能納微有嘔惡眩暈正氣雖得克復而肝胃氣尚未和也脈形緩弱右寸兩關重按見弦治擬兩和厥陰陽明法還須節食避風勿使反復附方候政高麗別直參東白芍左金丸三分拌炒純鉤澤瀉米炒大麥冬廣皮石決明生熟穀芽另煎代水原株金斛半夏曲朱茯神伏暑夾食龔左十九歲九月四日伏暑內發新涼外束加以食滯壅遏腑氣升降不和吐瀉交作脘悶口渴甚且厥逆不省人事支厥脈伏喘汗不止舌苔白膩以脈參症慎防厥脫之虞勉擬參附桂枝甘草龍骨牡蠣出入為法然恐鞭長莫及矣附方請高明酌奪臺參鬚龍骨東白芍左金丸二分同拌天生術五分左牡蠣熟附片五分煮去附入煎嫩桂枝五分炙草朱茯神戈製半夏五分來復丹五分新會皮霍亂夾食鄭六月二十六日暑寒濕食阻郁陽明三焦氣滯不和脘悶支倦症起腹中絞痛嘔吐泄瀉名曰霍亂繼則身熱憎寒口苦溺少轉防瘧痢兩端脈弦滑數舌苔黃膩治以正氣法加減生米仁新會皮丹皮赤苓車前草廣藿香半夏曲純嫩鉤木豬苓制川朴青蒿建神麯澤瀉霍亂施左五月寒暑穢濕互擾陽明清濁升降混淆霍然吐瀉交作脈形沉弦而滑治宜和中為先生米仁老木香左金丸三分同拌查炭木豬苓青荷梗廣藿香半夏曲六神麯澤瀉制川朴新會皮赤苓車前草徐霍亂轉筋治之非易照施氏方加木瓜鉤藤遺濕顏八月瘧後遺濕未清脾胃不和脈象弦數治宜調理生米仁新會皮綿杜仲川斛車前草佩蘭葉宋半夏川萆薢生穀芽赤苓川斷肉澤瀉鮮佛手風斑凌五月脾缺健運濕熱留著陽明現值太陰濕土司氣又加風邪擾動風濕客於皮膚汗出不徹致成風斑搔癢無定經謂汗出見濕乃生痤痱痤即風斑也脈弦數治宜調理祛法風濕稀蘞草新會皮丹皮連翹帶皮苓生葛根宋半夏川萆薢淨銀花蟬衣東白芍晚蠶砂緑豆衣寒水襲肺某七月三十日初平診夏秋陽氣發泄皮毛疏豁偶逢暴雨寒水之氣內襲太陰咳逆痰稠遷延日久邪郁化火釀痰痰青咽痛是其候也脈右郁滑近弦病本在肺何瞶瞶乎竟從肝腎主治耶擬從麻杏甘石湯法加味度中肯綮水煮麻黃炒兜鈴炙紫苑白茯苓白杏仁清炙草薄橘紅冬瓜子冰糖水炒石膏旋覆花絲瓜絡內燥高右八月十五日體稟陰虛水不涵木肝膽氣火偏旺木火凌金肺失清肅時在燥金司氣加以秋燥風邪乘虛襲入風燥相搏金受火刑咳嗽見紅咯痰色青胸脅引痛乍寒乍熱內熱為甚今但燥咳烘熱汗溢明是陰虛陽浮之徵脈濡小數右寸關獨大於諸部舌苔光紅中後微有黃胎以脈參證恐其陽絡血溢現近霜降節候慎防加劇謹擬喻氏清燥救肺出入為法冀其退機附方請政西洋參杷葉炙甘草冰糖水炒石膏玫瑰花連心麥冬真川貝陳阿膠鴨血炒絲瓜絡北杏仁火麻仁東白芍經霜桑葉冬溫痰火笑山兄十一月冬溫燥邪自肺胃擾動肝陽痰飲加以食滯壅遏腑氣升降不和始起寒熱如潮頭脹眩暈骨絡煩疼口乾嘔惡繼則身熱無休咳唾濁痰神疲嗜臥氣逆脘悶時有譫語良由痰熱自肺胃墊於心主宮城心經受其客熱清明主氣為邪濁所蒙也按脈弦滑數兼見左小弦數舌胎黃糙上齶滯膩濁痰非白屑也現屆冬至大節平素操勞心營自虛以脈參症如能痰氣順利邪熱減退即是轉機否則慎防喘脫之虞姑擬清心滌痰平肝降氣一則附方請政西洋參炒牛蒡竹瀝菖蒲汁和勻同沖羚角片川鬱金炒白蒺藜連翹旋覆花牛黃清心丸按此方本有杏仁川貝丹皮青黛石決明霍斛絲通草以其繁雜故不録也暑風化瘧慶侄暑風化瘧寒熱交作頭脹脘悶氣絡不舒脈弦滑數治宜疏解連翹川鬱金建神麯益元散廣藿香青蒿子新會皮青荷梗白杏仁地骨皮半貝丸鮮佛手吾師云寒濕瘧日日作藿香正氣散為主無汗加蘇梗豆豉杏仁寒多加草蔻生薑熱多加青蒿地骨皮腹脹加枳實大腹絨又云不可用扁豆用之必復發也愚見如正瘧者宜當詳考金匱論諸條柴胡湯等法又不可廢也亦不可拘處暑之前柴胡不可用陰瘧阮左九月八日夏秋暑濕留伏陽明近加新涼擾動邪自肺胃干及少陽寒熱間日而作咳嗽痰稠四肢酸倦便閉溺赤口苦脘悶皆由此致脈弦滑數舌苔黃膩陰虛體質治宜清解鱉血炒柴胡知母金斛炒竹茹淡鱉甲防柴胡無鱉血拌故用此地骨皮杏仁路路通青蒿子淡條芩半貝丸車前草又潮有餘波胃納缺醒眩暈肢倦口苦溺赤此陰虛留濕未清脈小弦數治宜清理元參新會皮鮮佛手車前草佩蘭葉宋半夏地骨皮生穀芽金斛青蒿子澤瀉鮮糯稻苗葉肝胃沈太太五十九歲六月二十九日肝升太過胃降不及平素操勞肝胃兩虛肝膽氣火偏旺氣滯不和又加感受暑風自肺胃擾動肝陽肝胃氣失通調脘痛脅脹身熱煩渴口乾嘔吐骨絡煩疼眠食缺安內經謂陰氣先傷陽氣獨發瘧自陰來者謂之疸瘧又云厥陰之為病苦寒熱是也脈弦滑數兼見尺部濡數舌苔黃糙少潤脈證互參切忌憹怒怒則氣逆陽升防有肝厥之虞治宜清解暑熱兩和肝胃法冀其退機另紙録方請正連翹青蒿東白芍川鬱金車前草銀花露地骨皮朱茯神玫瑰花鮮金斛淡鱉甲純嫩鉤薄橘紅陳少云五十二歲南潯三月二日肝陰素本不足肝膽氣火偏旺操勞動肝肝木與心火相為煽動肝與胃臟腑相對一勝一負肝善升而胃少降激動肝中濕濁痰飲加以食滯壅遏府氣始起寒熱脘悶繼則左脅引痛咳嗽身熱骨絡煩疼大便祕結此病本在肝胃而標在肺經所謂厥陰之為病苦寒熱是也脈氣六陽按左弦數而濡右寸關弦滑數兼見舌苔黃膩尖邊紅治宜清熱豁痰平肝降氣附方請高明政之西秦艽青蒿子赤苓玫瑰花二分挫末再研極細分沖淡鱉甲地骨皮方通草東白芍半貝丸銀胡金扁斛絲瓜絡枷楠香疸瘧孟右六月陰氣先傷陽氣獨發瘧自陰來但熱無寒者謂之疸瘧脈弦數治宜銀胡清骨飲北沙參知母粉丹皮朱茯神銀胡青蒿子純嫩鉤青荷梗淡鱉甲地骨皮玫瑰花氣虛下陷某勞倦內傷久瘧不已脈弦數而濡治宜補中益氣真防黨鱉血炒柴胡東白芍白雲苓炙冬朮炙黑升麻淡鱉甲清炙甘草嫩綿耆新會陳皮何首烏生薑汁炒奎紅暑濕泄瀉陳六月暑濕互擾陽明又加瓜果傷脾脾胃不和腸鳴泄瀉次數甚多脘悶腹脹口苦溺赤脈右弦滑治宜和中導滯生米仁扁豆衣半夏曲白寇仁車前草制川朴煨木香左金丸五分拌赤苓焦六曲廣藿香新會皮木豬苓澤瀉或用胃苓湯原方亦可脾虛泄瀉施大便溏泄已稀神色清潤肌肉漸生脾胃元氣未復之徵脈形弦緩治宜調中參苓白朮原方景嶽五陰煎四神丸皆可用之白積程左六月寒暑濕食互擾陽明寒熱似漸漸無汗泄邪陷成痢痢下白積更衣腹痛後重脈弦滑而濡舌苔黃膩治宜和中導滯生米仁煨木香左金丸五分拌車前草澤瀉廣藿香陳皮木豬苓赤苓制川朴楂炭半夏曲或可用枳殼大腹皮以疏泄之或加白蔻煨姜以溫之按赤白痢初起亦從此法即胃苓合香連之變方也以米仁代術車前代桂通陽餘三味合之即五苓散也暑濕內陷葛魚巷口瘧痢交作此由邪陷少陽陽明失於提解所致脈象弦數治宜疏解細柴胡香連丸車前草鮮蘇葉查楂葛根制川朴青蒿子赤苓淡條芩新會皮炒銀花半夏曲濕火紅積卓順兄長橋頭七月暑濕侵脾下痢紅積更衣腹痛後重乍寒乍熱脈弦滑數宜清解陽明煨葛根煨木香青蒿子木豬苓炒條芩枳殼炒丹皮青荷梗炒川連楂炭銀花或用白槿花或用白頭翁湯或用淡芩元明粉約三五分拌之赤白積煙漏葉左五十歲七月二十五日暑濕侵脾下痢赤白相雜晝夜無度更衣腹痛後重脈小弦數治宜泄木和肝生白朮東白芍半夏曲炒丹皮青荷蒂炒枳實煨木香楂炭赤白苓炒條芩新會皮青蒿子白槿花幼群兄七月吸烟之體胃氣與榮氣並虛夏秋暑濕蘊留陽明太陰脾經失運化之權加以食滯壅遏腑氣轉化敗濁下痢灰色更衣裡急後重晝夜登圊數十次之多古謂痢積稱滯下是也前醫謂其煙體進藥一味辛燥而氣火之勢益劇是以裡急更甚今診脈象左右三部弦數兼見舌苔光紅根後黃膩以脈參症正虛邪實難治奚疑拙擬宣氣導滯利濕清熱一則附方可否請高明酌政生米仁廣木香紫厚朴澤瀉焦鍋巴五錢連蒂青荷葉包佩蘭葉炒枳殼半夏曲車前草金斛大腹絨赤白苓架楠香二分挫末再研極細分沖噤口痢脫肛陳五歲七月痢經一月赤白相雜檢閲前醫數方一派攻伐遂致肝脾營陰受傷腸胃脂膏殆盡氣虛下陷圊時後重脫肛眼眶內陷神煩全不思食延成襟口重症慎防汗喘虛脫之變脈虛數近弦舌苔光紅姑擬人參石蓮飲為法冀其轉機附方請正臺參鬚鮮佛手露青蒿露各一兩代水燉沖江枳殼地榆炭澤瀉紅白扁豆花各十朵焙研分沖石蓮肉東白芍東壁土炒煨木香真川連拌車前草真野術陳壁土炒真陳不臭阿膠藕粉炒成珠抱木神辰砂拌陳年糕片綿包入煎休息痢羅左脾腎雙虛已成休息痢之候由來半載之久吸烟之體遷延非宜所幸胃氣尚蘇不致受困脈雙弦而濡擬宗繆仲淳法繆氏脾腎雙補丸四兩每日清晨午後空心青鹽湯送下三錢如酒積者葛花解酲湯主之飧泄費三和酒客中虛飧泄不已補中益氣湯主之胃苓湯法亦主之脫肛潘左二月久痢脫肛當宗東垣補中益氣法腸紅某腸紅三載糾纏不已肝脾營分受傷從歸脾湯法痔倪二月陰虛濕火下注肛門血痔更衣見紅由來日久即內經所謂陰絡傷則血內溢是也脈象弦數擬宗丹溪槐角法炒槐米黑荊芥丹皮炒黑赤苓地榆炭女貞子淨銀花炒焦澤瀉炒枳殼東白芍米仁車前草血不止加柿餅炭內外痔俱同法漏管者加象牙屑痔漏脫肛陳氣虛濕熱下注痔漏脫肛脈象弦數治宜調理水泛補中益氣丸四兩加味槐角丸四兩二丸和勻每日清晨午後空心開水送下五錢血痢何左正月脾缺健運濕熱留著陽明加以操勞動肝肝木乘脾脾失統血血痢糾纏更衣腹痛後重脈弦緩治宜兩和汗脾為先真防黨焦當歸遠志肉東白芍樗白皮嫩綿耆清炙草炒棗仁陳阿膠真於朮東壁土炒云茯神廣木香桂圓肉桂圓肉一枚苦參子五粒包吞水腫陳小孩二月寒水侮脾水腫脹滿脈雙弦而濡治之非易易耳米仁制香附法半夏廣陳皮車前子綿茵陳大腹絨椒目飛滑石帶皮苓制川朴地骷髏冬瓜皮此症小兒謂之瓠白大人謂之水腫同一病也下身腫脹許左年三十一歲八月三日傷於濕者下先受之諸濕腫滿皆屬於脾脾失運化之權濕熱曾著陽明太陰陽明之脈皆從足經而起濕熱下注其經氣絡不和腫自足跗而起膀胱氣化失司腫及陰囊小溲不利脈象弦緩治宜分利方照陳孩水腫之方去香附大腹絨加漢防己晚蠶沙腳氣如濕熱腳氣亦從此方加萆薢漢防己晚蠶沙按原稿無正方腫脹張七月脾肺氣虛中焦失運化之權濕熱蘊留陽明三焦氣滯不和腫自足跗而起延及四肢頭面腹脹少納四肢酸倦小溲不利脈右弦滑治宜清利生於術大腹絨椒目晚蠶沙酒炒絹包車前草炒枳實新會皮飛滑石帶皮苓制香附法半夏漢防己地骷髏水腫汪鴻橋年四十六歲七月寒水侮脾水腫脹滿前以分利不應今已喘矣脈形濡緩擬宗滿生加減腎氣湯法大熟地縮砂仁四分拌丹皮懷牛膝懷山藥帶皮苓車前子陳萸肉澤瀉地骷髏上搖桂熟附片各五分二味飯丸分吞按菁山某亦用此方數十劑全愈靈效非常寒濕氣滯左八月寒濕氣滯肝脾不和腹脹脘悶四肢酸倦氣逆痰稠眠食缺安脈右弦滑治宜泄木和中米仁大腹絨炒枳殼焦麥芽連穗車前草廣藿香新會皮萊蔔子杏仁制香附法半夏赤苓薑汁炒竹茹濕食僧六月濕食鬱遏腹脹不和治宜疏化藿香正氣丸保和丸各二兩二味和勻每服三錢開水送下單臌脹刑云窯濕熱侵脾脾虛作脹土不生金肺失清肅咳嗽便溏單腹臌脹青筋外露或腹笥膨脹青筋外露勢成單臌之候脈雙弦而濡治之非易易耳生於術大腹絨陳香櫞雞內金小溫中丸炒枳實新會皮沉香曲楂炭便結易萊蔔子制香附法半夏赤苓車前子李單腹膨脹希冀萬一生仙居術一錢陳新會皮一錢五分二味煎湯送丹溪小溫中丸三錢黃疸王右瘀滯黃疸脾胃不和脈象弦數治在陽明綿茵陳新會皮赤苓制川朴車前草連翹宋半夏木豬苓地骷髏赤小豆米仁澤瀉範志曲風淫末疾陸鈕店橋血不榮筋加以風濕阻絡陽明虛不能束筋骨以利機關手指麻木不仁風淫末疾是也脈小弦數治宜和營以祛風濕米仁西秦艽帶皮苓嫩桂枝川萆薢全當歸晚蠶沙片薑黃宣木瓜粒紅花或易雞血藤野桑枝行痹某風濕為痹遊走無定即前方加乳香七分陳酒半杯入煎著痹邱風寒濕三氣雜至合而為痹風勝為行痹寒勝為痛痹濕勝為著痹足筋痹由血不榮筋寒濕下注陽明經絡而成脈弦數苔薄白治宜疏解米仁西蓁艽帶皮苓懷牛膝川萆薢全當歸晚蠶沙虎脛骨宣木瓜粒紅花垂下野桑枝小活絡丹一顆剖開用開水化服痛痹康左七月寒濕下注足三里筋絡腫痛不能任地內經云伸而不能屈病在骨是也脈弦緩治宜和營以逐風濕照邱方加熟附片威靈仙半身不遂李左二十六歲館前初十半身不遂良由筋骨失於榮養寒濕乘隙入於筋絡所致前擬進溫通筋絡法已得小動脈弦緩仍步前法出入全當歸敗龜版米仁晚蠶沙東白芍瑣陽川萆薢制香附虎脛骨懷牛膝宣木瓜小活絡丹一顆又半身不遂擬進河間虎潛法已得活動而脛骨無力大筋軟短猶是血不榮筋使然脈弦仍踵前法全當歸虎脛骨懷牛膝制香附東白芍敗龜版米仁小活絡丹生地根瑣陽晚蠶沙痿躄欽局票痿躄成癱治之非易丹溪虎潛丸每服三錢青鹽湯送下風寒風寒襲肺杏蘇散主之杏仁桔梗法半夏生薑紫蘇梗或用葉用子皆可枳殼麩炒或用蜜炙赤苓紅棗前胡陳皮炙甘草風溫風溫襲肺即從徐姓秋燥方同見後暑風陳七月感受暑風擾於肺胃咳嗽潮熱脘悶口渴脈象數治宜清解老蘇梗薄橘紅竹茹冬瓜子薄荷梗白杏仁通草焦麥芽連翹象貝益元散青荷梗濕氣王濕鬱氣滯肝肺不和咳嗆氣逆宜用清泄米仁旋覆花路路通絲瓜絡冬瓜仁生蛤殼赤苓車前草白杏仁炒白蒺通草兼肺熱合瀉白散如面黃加茵陳如脹加萊蔔子風燥徐秋燥風溫治宜清肅元參橘紅丹皮竹茹蘿蔔汁薄荷炒牛蒡象貝通草連翹栝蔞皮純嫩鉤赤苓此方余在蔣永生家得來不知是何人手筆因屢試有驗故録之生米仁全栝蔞竹瀝一兩淡薑汁三滴和沖冬瓜仁海石粉黑山梔蘆根白杏仁青黛炒兜鈴如痰火阻肺絡聲嗄者亦效傅左寒水侮脾土無堤防水氣泛濫始起咳嗽繼則遍體浮腫腹脹氣逆脈象沉細治宜溫中利水症虞喘促之變附方請正生米仁三錢姜半夏二錢生薑皮六分白杏仁二錢熟附塊六分廣皮一錢椒目一錢炒蘇子一錢五分帶皮苓四錢杭白芍一錢五分冬瓜子皮各三錢此方系余診因有驗故附此傅左次診腫已漸消惟腳腫未已脈弦滑而緩照前方去蘇子加米泔制茅朮漢防己旋覆花濕疥瘡懸擬方余擬疥瘡有濕燥之分屬濕者應用此加減豨蘞草廣皮黑山梔綿茵陳帶皮苓蒺藜忍冬藤有熱疼痛加連翹大腹絨晚蠶沙黃芩胃咳李官官三歲三月胃咳則蟲動蟲動則嘔非比痰阻肺氣為咳讀內經咳論自知也脈右弦滑而浮治宜降氣平肝理胃炙桑皮新會皮旋覆花烏梅肉薑汁炒竹茹地骨皮